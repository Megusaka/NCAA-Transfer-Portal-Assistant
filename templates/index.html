<!DOCTYPE html>
<html>
<head>
    <title>NCAA Volleyball Transfer Portal Assistant</title>
</head>
<body>

    <h1>NCAA Volleyball Transfer Portal Assistant</h1>

    <h2>Search Player</h2>
    <form method="POST">
        <label>First Name:</label>
        <input type="text" name="first_name" required><br><br>

        <label>Last Name:</label>
        <input type="text" name="last_name" required><br><br>

        <label>School:</label>
        <input type="text" name="school" required><br><br>

        <button type="submit">Search</button>
    </form>
   
    <hr>

    <h2>Search History</h2>

    {% if players %}
        <ul>
        {% for player in players %}
            <a href="{{ url_for('player_detail', pii_id=player[0]) }}">
                {{ player[1] }} {{ player[2] }} — {{ player[3] }}   <!--player.first_name if change to dictionary-->
            </a>
        {% endfor %}
   
        </ul>
    {% else %}
        <p>No players searched yet.</p>
    {% endif %}

</body>
</html>
